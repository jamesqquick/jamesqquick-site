name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Patch wrangler config for local-only build
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('wrangler.jsonc', 'utf8');
            const cleaned = raw.replace(/\/\/.*/g, '');
            const cfg = JSON.parse(cleaned);
            if (cfg.r2_buckets) cfg.r2_buckets.forEach(b => delete b.remote);
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(cfg, null, 2));
          "

      - name: Build site
        run: pnpm run build

      - name: Start wrangler dev server
        run: |
          npx wrangler dev --local --port 8787 &
          sleep 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: "./.lighthouserc.cjs"
          uploadArtifacts: true
          temporaryPublicStorage: true
